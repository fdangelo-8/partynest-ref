kind = "web"
previewPath = "/"
title = "PartyNest"
version = "1.0.0"
id = "artifacts/partynest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23769

[services.development]
run = "pnpm --filter @workspace/partynest run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/partynest", "run", "build" ]
publicDir = "artifacts/partynest/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23769"
BASE_PATH = "/"
